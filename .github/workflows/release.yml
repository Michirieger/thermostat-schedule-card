name: Release

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist to release
        uses: softprops/action-gh-release@v2
        with:
          files: thermostat-schedule-card.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
